// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
        classpath 'com.google.gms:google-services:4.4.4'
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
  // Shorten build directory to prevent Windows MAX_PATH (260 char) errors in C++ compilation.
  // Only apply on Windows: on Linux (EAS Build) this redirect splits the CMake build paths
  // (intermediates -> b/, .cxx -> normal) and breaks native library linking (arm64-v8a CMake configure).
  if (project != rootProject && System.getProperty("os.name").toLowerCase().contains("windows")) {
    layout.buildDirectory.set(file("${rootDir}/../../../b/${project.name}"))
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
